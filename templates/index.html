<!DOCTYPE html>
<html>
<head>
  <title>My Book Shelf</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">📚 My Book Shelf</div>

    <div class="search-container">
      <input type="text" placeholder="Search by title or author..." id="searchBar">
    </div>

    <div class="user-icon">👤</div>
  </header>

  <main>

    <!-- Add Book -->
    <div id="addBook" class="card">
      <h2>Add a Book</h2>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <input type="text" id="bookTitle" placeholder="Book Title" style="flex:2; min-width:200px;">
        <input type="text" id="publicationYear" placeholder="Year (YYYY)" style="width:140px;">
        <input type="text" id="authorName" placeholder="Author Name" style="flex:1; min-width:160px;">
        <input type="text" id="imageUrl" placeholder="Image URL (https://...)" style="flex:2; min-width:240px;">
      </div>

      <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" class="primary-btn" onclick="addBook()">Add Book</button>
        <button type="button" id="showBooksButton" class="secondary-btn">Show All Books</button>
      </div>
    </div>

    <!-- Bookshelf -->
    <section id="bookshelfSection" class="card" style="margin-top: 16px;">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <h2 style="margin:0;">Bookshelf</h2>
        <small style="opacity:0.7;">Hover a book to see the effect</small>
      </div>

      <div id="allbooks" class="books-grid" style="margin-top:12px;"></div>

      <div class="pagination" style="margin-top:12px;">
        <button type="button" id="prevBtn" class="secondary-btn">← Previous</button>
        <button type="button" id="nextBtn" class="secondary-btn">Next →</button>
      </div>
    </section>

    <!-- Reviews -->
    <section class="card" style="margin-top: 16px;">
      <h2>Book Reviews</h2>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <input type="text" id="reviewBookTitle" placeholder="Book Title (type or paste)" style="flex:2; min-width:220px;">
        <input type="text" id="reviewerName" placeholder="Your Name" style="flex:1; min-width:160px;">
        <input type="number" id="reviewRating" placeholder="Rating (1-5)" min="1" max="5" style="width:140px;">
      </div>

      <textarea id="reviewText" placeholder="Write your review..." rows="3" style="width:100%; margin-bottom:10px;"></textarea>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" class="primary-btn" onclick="addReview()">Submit Review</button>
        <button type="button" class="secondary-btn" onclick="loadReviews()">Refresh Reviews</button>
      </div>

      <hr style="margin:16px 0;">
      <div id="reviewsList"></div>
    </section>

  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
