<!DOCTYPE html>
<html>

<head>
    <title>My Book Shelf</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- Header / Navbar -->
    <header class="navbar app-navbar">
        <div class="logo">📚 My Book Shelf</div>

        <div class="search-container">
            <input type="text" placeholder="Search by title or author..." id="searchBar">
        </div>

        <div class="user-icon">👤</div>
    </header>

    <main class="container mt-4">
        <!-- Add Book Card -->
        <div id="addBook" class="card p-3 mb-3">
            <h2 class="mb-3">Add a Book</h2>

            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="bookTitle" class="form-control" placeholder="Book Title">
                </div>
                <div class="col-md-2">
                    <input type="text" id="publicationYear" class="form-control" placeholder="Year (YYYY)">
                </div>
                <div class="col-md-3">
                    <input type="text" id="authorName" class="form-control" placeholder="Author Name">
                </div>
                <div class="col-md-4">
                    <input type="text" id="imageUrl" class="form-control" placeholder="Image URL (https://...)">
                </div>
            </div>

            <div class="mt-3">
                <button type="button" class="primary-btn" onclick="addBook()">Add Book</button>
                <button type="button" id="showBooksButton" class="secondary-btn ms-2" onclick="showAllBooks()">Show All Books</button>
            </div>
        </div>

        <!-- Bookshelf Section -->
        <div id="allbooks-section">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h3 class="m-0">Bookshelf</h3>
                <div class="text-muted small">Hover a book to see the effect</div>
            </div>

            <div id="allbooks" class="books-grid"></div>

            <div class="pagination mt-3">
                <button type="button" id="prevBtn" class="secondary-btn" onclick="previousPage()">← Previous</button>
                <button type="button" id="nextBtn" class="secondary-btn" onclick="nextPage()">Next →</button>
            </div>
        </div>

        <!-- Reviews Section (MongoDB) -->
        <div id="reviews-section" class="card p-3 mt-4">
            <h3 class="mb-3">Book Reviews</h3>

            <!-- Add Review Form -->
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="reviewBookTitle" class="form-control" placeholder="Book Title">
                </div>
                <div class="col-md-2">
                    <input type="text" id="reviewerName" class="form-control" placeholder="Reviewer">
                </div>
                <div class="col-md-2">
                    <input type="number" id="reviewRating" class="form-control" placeholder="Rating (1-5)" min="1" max="5">
                </div>
                <div class="col-md-5">
                    <input type="text" id="reviewText" class="form-control" placeholder="Write a short review">
                </div>
            </div>

            <div class="mt-3">
                <button type="button" class="primary-btn" onclick="addReview()">Add Review</button>
                <button type="button" class="secondary-btn ms-2" onclick="loadReviews()">Refresh Reviews</button>
            </div>

            <!-- Reviews List -->
            <div id="reviewsList" class="mt-3"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
